<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduShare - All Uploaded Materials</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.12) 0, transparent 50%), 
                        radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.12) 0, transparent 50%), 
                        #0b0f19;
            min-height: 100vh;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: #6366f1;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            top: -50px;
            left: -50px;
            z-index: -1;
        }

        .card {
            background: rgba(17, 24, 39, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #f8fafc;
        }

        .pdf-list {
            list-style-type: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pdf-item {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .pdf-item:hover {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .pdf-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 70%;
        }

        .pdf-title {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
        }

        .pdf-desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.4;
        }

        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>All Shared Study Materials</h1>
                <a href="{% url 'student_dashboard' %}" class="back-link">← Go Back</a>
            </div>

            <ul class="pdf-list">
                {% for pdf in pdfs %}
                    <li class="pdf-item">
                        <div class="pdf-info">
                            <strong class="pdf-title">{{ pdf.title }}</strong>
                            <span class="pdf-desc">{{ pdf.description }}</span>
                        </div>
                        <a href="{% url 'view_pdf' pdf.id %}" class="action-btn">AI Assistant</a>
                    </li>
                {% empty %}
                    <li class="empty-state">
                        <p>No materials have been uploaded yet.</p>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
